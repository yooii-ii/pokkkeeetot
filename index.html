<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nanami Adventure</title>

<style>

body{
margin:0;
background:#222;
display:flex;
flex-direction:column;
align-items:center;
font-family:sans-serif;
color:white;
}

#ui{
margin:10px;
font-size:20px;
}

canvas{
border:4px solid white;
background:linear-gradient(#7fd3ff,#e8f7ff);
}

</style>
</head>

<body>

<div id="ui">Stage 1 | Score 0</div>
<canvas id="game" width="900" height="400"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let stage=0
let score=0

const gravity=0.8

const player={
x:50,
y:0,
w:35,
h:35,
vx:0,
vy:0,
jump:true
}

const stages=[

{
platforms:[
{x:0,y:370,w:900,h:30},
{x:200,y:300,w:120,h:20},
{x:400,y:260,w:120,h:20},
{x:600,y:220,w:120,h:20}
],

stars:[
{x:230,y:260},
{x:430,y:220}
],

enemies:[
{x:500,y:340,w:30,h:30,dir:1}
],

goal:{x:820,y:330,w:40,h:40}
},

{
platforms:[
{x:0,y:370,w:900,h:30},
{x:150,y:320,w:120,h:20},
{x:350,y:280,w:120,h:20},
{x:550,y:240,w:120,h:20},
{x:750,y:200,w:120,h:20}
],

stars:[
{x:180,y:280},
{x:380,y:240},
{x:580,y:200}
],

enemies:[
{x:300,y:340,w:30,h:30,dir:1},
{x:650,y:340,w:30,h:30,dir:-1}
],

goal:{x:850,y:330,w:40,h:40}
}

]

const keys={}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

function resetPlayer(){
player.x=50
player.y=0
player.vx=0
player.vy=0
}

function update(){

player.vx=0

if(keys["ArrowRight"]) player.vx=4
if(keys["ArrowLeft"]) player.vx=-4

if(keys["Space"] && !player.jump){
player.vy=-14
player.jump=true
}

player.vy+=gravity
player.x+=player.vx
player.y+=player.vy

player.jump=true

stages[stage].platforms.forEach(p=>{

if(
player.x < p.x+p.w &&
player.x+player.w > p.x &&
player.y+player.h < p.y+10 &&
player.y+player.h+player.vy >= p.y
){
player.y=p.y-player.h
player.vy=0
player.jump=false
}

})

stages[stage].stars.forEach((s,i)=>{

if(
player.x < s.x+20 &&
player.x+player.w > s.x &&
player.y < s.y+20 &&
player.y+player.h > s.y
){
stages[stage].stars.splice(i,1)
score++
}

})

stages[stage].enemies.forEach(e=>{

e.x += 2 * e.dir

if(e.x<0 || e.x>860) e.dir*=-1

if(
player.x < e.x+e.w &&
player.x+player.w > e.x &&
player.y < e.y+e.h &&
player.y+player.h > e.y
){
resetPlayer()
}

})

const g=stages[stage].goal

if(
player.x < g.x+g.w &&
player.x+player.w > g.x &&
player.y < g.y+g.h &&
player.y+player.h > g.y
){

stage++

if(stage>=stages.length){
alert("ゲームクリア！ Score:"+score)
stage=0
score=0
}

resetPlayer()

}

document.getElementById("ui").innerText =
"Stage "+(stage+1)+" | Score "+score

}

function draw(){

ctx.clearRect(0,0,900,400)

ctx.fillStyle="green"

stages[stage].platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h)
})

ctx.fillStyle="yellow"

stages[stage].stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,10,0,Math.PI*2)
ctx.fill()
})

ctx.fillStyle="purple"

stages[stage].enemies.forEach(e=>{
ctx.fillRect(e.x,e.y,e.w,e.h)
})

const g=stages[stage].goal
ctx.fillStyle="gold"
ctx.fillRect(g.x,g.y,g.w,g.h)

ctx.fillStyle="red"
ctx.fillRect(player.x,player.y,player.w,player.h)

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

resetPlayer()
loop()

</script>

</body>
</html>
