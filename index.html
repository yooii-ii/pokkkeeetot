
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Stage Platform Game</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
color:white;
flex-direction:column;
}

#game{
border:4px solid white;
background:linear-gradient(#6ecbff,#dff6ff);
}

#info{
margin-bottom:10px;
font-size:20px;
}

</style>
</head>

<body>

<div id="info">Stage: 1 | Score: 0</div>
<canvas id="game" width="800" height="400"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let stage = 0
let score = 0

const gravity = 0.8

const player = {
x:50,
y:0,
width:35,
height:35,
vx:0,
vy:0,
jump:false
}

const stages = [

{
platforms:[
{x:0,y:370,w:800,h:30},
{x:200,y:300,w:120,h:20},
{x:400,y:250,w:120,h:20},
{x:600,y:200,w:120,h:20}
],
stars:[
{x:230,y:260},
{x:430,y:210},
{x:630,y:160}
]
},

{
platforms:[
{x:0,y:370,w:800,h:30},
{x:150,y:320,w:100,h:20},
{x:350,y:270,w:100,h:20},
{x:550,y:220,w:100,h:20}
],
stars:[
{x:180,y:280},
{x:380,y:230},
{x:580,y:180}
]
},

{
platforms:[
{x:0,y:370,w:800,h:30},
{x:250,y:300,w:100,h:20},
{x:450,y:240,w:100,h:20},
{x:650,y:180,w:100,h:20}
],
stars:[
{x:280,y:260},
{x:480,y:200},
{x:680,y:140}
]
}

]

const keys = {}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

function resetPlayer(){
player.x=50
player.y=0
player.vx=0
player.vy=0
}

function update(){

player.vx=0

if(keys["ArrowRight"]) player.vx=4
if(keys["ArrowLeft"]) player.vx=-4

if(keys["Space"] && !player.jump){
player.vy=-14
player.jump=true
}

player.vy+=gravity
player.x+=player.vx
player.y+=player.vy

player.jump=true

stages[stage].platforms.forEach(p=>{

if(
player.x < p.x + p.w &&
player.x + player.width > p.x &&
player.y + player.height < p.y + 10 &&
player.y + player.height + player.vy >= p.y
){
player.y = p.y - player.height
player.vy = 0
player.jump = false
}

})

stages[stage].stars.forEach((s,i)=>{

if(
player.x < s.x + 20 &&
player.x + player.width > s.x &&
player.y < s.y + 20 &&
player.y + player.height > s.y
){
stages[stage].stars.splice(i,1)
score++
}

})

if(stages[stage].stars.length===0){

stage++

if(stage>=stages.length){
alert("ゲームクリア！ Score:"+score)
stage=0
score=0
}

resetPlayer()
}

document.getElementById("info").innerText =
"Stage: "+(stage+1)+" | Score: "+score

}

function draw(){

ctx.clearRect(0,0,800,400)

ctx.fillStyle="green"

stages[stage].platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h)
})

ctx.fillStyle="red"
ctx.fillRect(player.x,player.y,player.width,player.height)

ctx.fillStyle="yellow"

stages[stage].stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,10,0,Math.PI*2)
ctx.fill()
})

}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

resetPlayer()
loop()

</script>

</body>
</html>
